<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crear QR Online Gratis</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
    margin: 0;
}

header {
    padding: 20px;
    background: #020617;
}

h1 {
    margin: 0;
}

.container {
    padding: 20px;
}

input {
    padding: 12px;
    width: 260px;
    border-radius: 8px;
    border: none;
    margin: 5px;
}

button {
    padding: 12px 20px;
    background: #22c55e;
    border: none;
    border-radius: 8px;
    color: white;
    cursor: pointer;
    margin: 5px;
}

button:hover {
    background: #16a34a;
}

#qrcode {
    margin-top: 20px;
}

.ad {
    margin: 20px;
    padding: 20px;
    background: #1e293b;
}

footer {
    padding: 10px;
    background: #020617;
    font-size: 14px;
}
</style>
</head>

<body>

<header>
    <h1>Crear QR Online Gratis</h1>
    <p>Generador rápido y fácil</p>
</header>

<div class="container">

    <h2>🔗 Generar QR desde enlace</h2>
    <input type="text" id="link" placeholder="Pega tu enlace">
    <br>
    <button onclick="generarQR()">Generar QR</button>

    <h2>📱 QR de WhatsApp</h2>
    <input type="text" id="numero" placeholder="Número (ej: 549381...)">
    <input type="text" id="mensaje" placeholder="Mensaje">
    <br>
    <button onclick="qrWhatsapp()">Generar QR WhatsApp</button>

    <div id="qrcode"></div>
    <br>
    <button onclick="descargarQR()">Descargar QR</button>

</div>

<div class="ad">
    <!-- PEGAR AQUI CODIGO ADSENSE -->
    <p>Publicidad</p>
</div>

<footer>
    © 2026 crearqronline.com
</footer>

<script>
let qr;

function generarQR() {
    document.getElementById("qrcode").innerHTML = "";
    let link = document.getElementById("link").value;

    qr = new QRCode(document.getElementById("qrcode"), {
        text: link,
        width: 200,
        height: 200
    });
}

function qrWhatsapp() {
    document.getElementById("qrcode").innerHTML = "";
    let num = document.getElementById("numero").value;
    let msg = document.getElementById("mensaje").value;

    let url = `https://wa.me/${num}?text=${encodeURIComponent(msg)}`;

    qr = new QRCode(document.getElementById("qrcode"), {
        text: url,
        width: 200,
        height: 200
    });
}

function descargarQR() {
    let img = document.querySelector("#qrcode img");
    if (!img) return alert("Primero genera un QR");

    let link = document.createElement("a");
    link.href = img.src;
    link.download = "qr.png";
    link.click();
}
</script>

</body>
</html>
