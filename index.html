<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crear QR Online Gratis</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #0f172a, #020617);
    color: white;
    text-align: center;
    margin: 0;
    animation: fadeIn 1s ease-in;
}

@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

header {
    padding: 20px;
    background: #020617;
    animation: slideDown 0.8s ease;
}

@keyframes slideDown {
    from {transform: translateY(-50px); opacity: 0;}
    to {transform: translateY(0); opacity: 1;}
}

.container {
    padding: 20px;
}

input {
    padding: 12px;
    width: 260px;
    border-radius: 8px;
    border: none;
    margin: 5px;
    transition: 0.3s;
}

input:focus {
    transform: scale(1.05);
}

button {
    padding: 12px 20px;
    background: #22c55e;
    border: none;
    border-radius: 8px;
    color: white;
    cursor: pointer;
    margin: 5px;
    transition: 0.3s;
}

button:hover {
    background: #16a34a;
    transform: scale(1.1);
}

#qrcode {
    margin-top: 20px;
    animation: fadeIn 0.5s ease;
}

.ad {
    margin: 20px;
    padding: 20px;
    background: #1e293b;
    border-radius: 10px;
    animation: fadeIn 2s ease;
}

footer {
    padding: 10px;
    background: #020617;
    font-size: 14px;
}
</style><!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-5TY0GZL9BE"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-5TY0GZL9BE');
</script>
</head>

<body>

<header>
    <h1>Crear QR Online Gratis</h1>
    <p>Rápido, gratis y sin registro</p>
</header>

<div class="container">

    <h2>🔗 Generar QR</h2>
    <input type="text" id="link" placeholder="Pega tu enlace">
    <br>
    <button onclick="generarQR()">Generar QR</button>

    <div id="qrcode"></div>

    <br>
    <button onclick="descargarQR()">Descargar</button>

</div>

<div class="ad">
    <p>Publicidad</p>
</div>

<footer>
    © 2026 crearqronline
</footer>

<script>
function generarQR() {
    document.getElementById("qrcode").innerHTML = "";

    let link = document.getElementById("link").value;

    new QRCode(document.getElementById("qrcode"), {
        text: link,
        width: 200,
        height: 200
    });
}

function descargarQR() {
    let img = document.querySelector("#qrcode img");
    if (!img) return alert("Primero genera un QR");

    let link = document.createElement("a");
    link.href = img.src;
    link.download = "qr.png";
    link.click();
}
</script>

</body>
</html>
